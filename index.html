<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <h1>Quem está assistindo?</h1>
  </header>

  <main>
    <section class="profiles" aria-label="Perfis de usuário">

      <article class="profile">
        <figure>
          <div class="img-wrapper">
            <img src="assets/lulu.webp" alt="Lulu do lol">
          </div>
          <figcaption>Lulu</figcaption>
        </figure>
      </article>

      <article class="profile">
        <figure>
          <div class="img-wrapper">
            <img src="/assets/teemo.webp" alt="Imagem de Teemo">
          </div>
          <figcaption>Teemo</figcaption>
        </figure>
      </article>

      <article class="profile">
        <figure>
          <div class="img-wrapper">
            <img src="/assets/vex.webp" alt="Imagem de Vex">
          </div>
          <figcaption>Vex</figcaption>
        </figure>
      </article>

      <article class="profile">
        <figure>
          <div class="img-wrapper">
            <img src="/assets/heimer.webp" alt="Imagem de Heimer">
          </div>
          <figcaption>Heimerdinger</figcaption>
        </figure>
      </article>

      <article class="AddPerfil">
        <figure>
          <div class="img-wrapper">
            <img src="/assets/AddPerfil.svg" alt="Adicionar Perfil">
          </div>
          <figcaption>Adicionar Perfil</figcaption>
        </figure>
      </article>

    </section>
  </main>
</body>

</html>
